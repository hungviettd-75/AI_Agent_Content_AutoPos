# Paste these keys into Streamlit Community Cloud > App settings > Secrets.
# Do not commit a real secrets.toml file.

DB_ENGINE = "postgresql"

# Option A: full URL from Neon/Supabase/Render Postgres.
# If the password contains special characters and this fails, use Option B below.
PG_DSN = "postgresql://USER:PASSWORD@HOST/DB?sslmode=require"
# DATABASE_URL = "postgresql://USER:PASSWORD@HOST/DB?sslmode=require"

# Option B: safer when password contains @, #, /, ?, : or other URL-sensitive characters.
# PG_HOST = "your-db-host"
# PG_PORT = "5432"
# PG_NAME = "your-db-name"
# PG_USER = "your-db-user"
# PG_PASSWORD = "your-db-password"
# PG_SSLMODE = "require"

SECRET_KEY = "replace-with-a-long-random-secret"
JWT_EXPIRE_HOURS = "24"

GEMINI_API_KEY = ""
FB_PAGE_ID = ""
FB_ACCESS_TOKEN = ""
ZALO_OA_ID = ""
ZALO_ACCESS_TOKEN = ""
LINKEDIN_AUTHOR_URN = ""
LINKEDIN_ACCESS_TOKEN = ""
LOG_LEVEL = "INFO"
LOG_FILE = "app_execution.log"
